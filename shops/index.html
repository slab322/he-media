<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>地域のお店｜H.E. MEDIA</title>
<meta name="description" content="地域のお店を紹介します。飲食、美容、買い物、暮らしなどのお店を順次掲載します。">
<meta name="theme-color" content="#FFA965">
<link rel="canonical" href="https://media.he-company.com/shops/">
<meta property="og:type" content="website">
<meta property="og:title" content="地域のお店｜H.E. MEDIA">
<meta property="og:description" content="地域のお店を紹介します。飲食、美容、買い物、暮らしなどのお店を順次掲載します。">
<meta property="og:url" content="https://media.he-company.com/shops/">
<meta property="og:image" content="https://media.he-company.com/assets/icons/icon-512.png">
<meta property="og:locale" content="ja_JP">
<link rel="icon" href="/assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="stylesheet" href="/assets/css/base.css">
<link rel="stylesheet" href="/assets/css/components.css">
<link rel="stylesheet" href="/assets/css/pages.css">
</head>
<body data-page="shops">

<header class="app-header">
  <div class="app-header__left">
    <span class="app-header__title">地域のお店</span>
  </div>
  <div class="app-header__right">
    <button type="button" class="icon-btn" data-search-open aria-label="検索">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    </button>
    <button type="button" class="icon-btn" data-coming-soon="通知機能は準備中です" aria-label="通知">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
    </button>
  </div>
</header>

<main class="app-main">
  <h1 class="page-title">地域のお店</h1>

  <div class="filter-bar">
    <button type="button" class="filter-bar__field" data-search-open aria-label="キーワードで検索">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span>キーワードで検索</span>
    </button>
    <button type="button" class="icon-btn" style="border:1px solid var(--color-border);" data-coming-soon="エリアでの絞り込みは準備中です" aria-label="エリアで絞り込む">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
    </button>
  </div>

  <div class="filter-chips" data-filter-chips role="group" aria-label="カテゴリーで絞り込む">
    <button type="button" class="filter-chip is-active" data-filter-value="all">すべて</button>
    <button type="button" class="filter-chip" data-filter-value="food">飲食</button>
    <button type="button" class="filter-chip" data-filter-value="beauty">美容</button>
    <button type="button" class="filter-chip" data-filter-value="shopping">買い物</button>
    <button type="button" class="filter-chip" data-filter-value="life">暮らし</button>
    <button type="button" class="filter-chip" data-filter-value="other">その他</button>
  </div>

  <div class="tabs" data-page-tabs data-tabs role="tablist" aria-label="表示切り替え">
    <button type="button" class="tab is-active" data-tab-value="recommend" role="tab" aria-selected="true">おすすめ</button>
    <button type="button" class="tab" data-tab-value="partner" role="tab" aria-selected="false">協力店</button>
    <button type="button" class="tab" data-tab-value="new" role="tab" aria-selected="false">新着</button>
  </div>

  <div data-panel="recommend">
    <div class="card-grid shops-grid" data-shop-list></div>
  </div>
  <div data-panel="partner" hidden>
    <div class="empty-state">
      <span class="empty-state__icon placeholder-image" aria-hidden="true"></span>
      <p>協力店情報は準備中です。決まり次第、順次掲載します。</p>
    </div>
  </div>
  <div data-panel="new" hidden>
    <div class="empty-state">
      <span class="empty-state__icon placeholder-image" aria-hidden="true"></span>
      <p>新着店舗情報は準備中です。決まり次第、順次掲載します。</p>
    </div>
  </div>
</main>

<nav class="bottom-nav" aria-label="メインナビゲーション">
  <a href="/" class="bottom-nav__item" data-nav-match="/" aria-label="ホーム">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11l9-7 9 7"/><path d="M5 10v9h5v-6h4v6h5v-9"/></svg>
    <span>ホーム</span>
  </a>
  <a href="/events/" class="bottom-nav__item" data-nav-match="/events/" aria-label="イベント">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
    <span>イベント</span>
  </a>
  <a href="/shops/" class="bottom-nav__item" data-nav-match="/shops/" aria-label="お店">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9l1-5h14l1 5"/><path d="M4 9a2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0"/><path d="M5 9v10h14V9"/></svg>
    <span>お店</span>
  </a>
  <a href="/media/" class="bottom-nav__item" data-nav-match="/media/" aria-label="メディア">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg>
    <span>メディア</span>
  </a>
  <a href="/more/" class="bottom-nav__item" data-nav-match="/more/" aria-label="その他">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <span>その他</span>
  </a>
</nav>

<div class="modal-overlay" data-search-modal aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-label="検索">
    <div class="modal__header">
      <h2 class="modal__title">検索</h2>
      <button type="button" class="icon-btn" data-search-close aria-label="閉じる">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <input type="text" class="modal__input" placeholder="お店を検索" aria-label="検索キーワード">
    <p class="modal__note">検索機能は現在準備中です。近日公開予定です。</p>
  </div>
</div>

<div class="toast" data-toast role="status" aria-live="polite"></div>

<script src="/assets/js/data.js"></script>
<script src="/assets/js/ui.js"></script>
<script src="/assets/js/app.js"></script>
</body>
</html>
